name: deploy-monitoring

on:
  push:
    branches:
      - main
    paths:
      - 'monitoring/server/**'
      - 'scripts/deploy-monitoring.sh'
      - '.github/workflows/deploy-monitoring.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2

concurrency:
  group: deploy-monitoring
  cancel-in-progress: false

jobs:
  validate:
    uses: ./.github/workflows/validate-monitoring-config.yml

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5    # v6.1.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/DitdaGitHubMonitoringDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy monitoring server via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.MONITORING_EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/scripts/deploy-monitoring.sh -o /tmp/deploy-monitoring.sh',
              'chmod +x /tmp/deploy-monitoring.sh',
              'export AWS_REGION=${{ env.AWS_REGION }}',
              'export GITHUB_REPO=${{ github.repository }}',
              'export COMMIT_SHA=${{ github.sha }}',
              'bash /tmp/deploy-monitoring.sh'
            ]" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: ${COMMAND_ID}"

          for i in {1..120}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${{ secrets.MONITORING_EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Status: ${STATUS}"

            if [ "${STATUS}" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${{ secrets.MONITORING_EC2_INSTANCE_ID }}" \
                --query "StandardOutputContent" --output text
              exit 0
            elif [ "${STATUS}" = "Failed" ] || [ "${STATUS}" = "Cancelled" ] || [ "${STATUS}" = "TimedOut" ]; then
              echo "=== STDOUT ==="
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${{ secrets.MONITORING_EC2_INSTANCE_ID }}" \
                --query "StandardOutputContent" --output text
              echo "=== STDERR ==="
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${{ secrets.MONITORING_EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 5
          done

          echo "❌ 타임아웃"
          exit 1

      - name: Send Discord notification on success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"📊 DITDA 모니터링 서버 배포 성공\", \"color\": 3066993, \"fields\": [{\"name\": \"Commit\", \"value\": \"\`${{ github.sha }}\`\", \"inline\": true}, {\"name\": \"Author\", \"value\": \"${{ github.actor }}\", \"inline\": true}], \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}]}" \
            $DISCORD_WEBHOOK || true

      - name: Send Discord notification on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"❌ DITDA 모니터링 서버 배포 실패\", \"color\": 15158332, \"fields\": [{\"name\": \"Commit\", \"value\": \"\`${{ github.sha }}\`\", \"inline\": true}, {\"name\": \"Run\", \"value\": \"[로그 보기](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false}], \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}]}" \
            $DISCORD_WEBHOOK || true
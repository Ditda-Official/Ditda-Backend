services:
  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: ditda-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d     # 보존기간: 15일
      - --web.enable-lifecycle                # /-/reload로 설정 무중단 갱신
      - --web.enable-remote-write-receiver


  loki:
    image: grafana/loki:3.7.3
    container_name: ditda-loki
    restart: unless-stopped
    environment:
      S3_LOKI_BUCKET: ${S3_LOKI_BUCKET}
      S3_REGION: ${S3_REGION}
    command:
      - -config.file=/etc/loki/loki-config.yaml
      - -config.expand-env=true
    volumes:
      - ./loki/loki-config.prod.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki

  tempo:
    image: grafana/tempo:3.0.2
    container_name: ditda-tempo
    restart: unless-stopped
    environment:
      S3_TEMPO_BUCKET: ${S3_TEMPO_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
    command:
      - -config.file=/etc/tempo/tempo.yaml
      - -config.expand-env=true
    volumes:
      - ./tempo/tempo.prod.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo

  monitoring-proxy:
    image: nginx:1.27-alpine
    container_name: ditda-monitoring-proxy
    restart: unless-stopped
    volumes:
      - ./nginx/loki.conf:/etc/nginx/conf.d/loki.conf:ro
      - ./nginx/tempo.conf:/etc/nginx/conf.d/tempo.conf:ro
      - ./nginx/prometheus.conf:/etc/nginx/conf.d/prometheus.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "3100:3100"
      - "4318:4318"
      - "9090:9090"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started

  grafana:
    image: grafana/grafana:13.1.0
    container_name: ditda-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started


volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:

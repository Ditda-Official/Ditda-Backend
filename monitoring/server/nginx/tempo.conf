server {
    listen 4318 ssl;
    ssl_certificate     /etc/nginx/certs/mon.crt;
    ssl_certificate_key /etc/nginx/certs/mon.key;

    auth_basic "Ditda Tempo";
    auth_basic_user_file /etc/nginx/.htpasswd;
    client_max_body_size 20M;

    location /v1/traces {
        resolver 127.0.0.11 valid=10s;
        set $tempo_upstream http://tempo:4318;
        proxy_pass $tempo_upstream;
    }

    location / {
        return 404;
    }
}
server {
    listen 9090 ssl;
    ssl_certificate     /etc/nginx/certs/mon.crt;
    ssl_certificate_key /etc/nginx/certs/mon.key;

    auth_basic "Ditda Prometheus";
    auth_basic_user_file /etc/nginx/.htpasswd;
    client_max_body_size 20M;

    location /api/v1/write {
        resolver 127.0.0.11 valid=10s;
        set $prom_upstream http://prometheus:9090;
        proxy_pass $prom_upstream;
    }

    location / {
        return 404;
    }
}
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
  storage:
    s3:
      bucketnames: ${S3_LOKI_BUCKET}
      region: ${S3_REGION}

schema_config:
  configs:
    - from: 2026-07-01
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: s3

limits_config:
  retention_period: 90d               # 로그 저장일: 90일
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_label_names_per_series: 15      # 최대 라벨 개수: 15개
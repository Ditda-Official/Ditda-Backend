services:
  blue:
    image: ${ECR_REGISTRY}:${IMAGE_TAG:-latest}
    container_name: ditda-blue
    restart: unless-stopped
    labels:
      ditda.logs.app: "ditda"
      ditda.logs.service: "ditda-api"
    ports:
      - "127.0.0.1:8081:8080"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ditda-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  green:
    image: ${ECR_REGISTRY}:${IMAGE_TAG:-latest}
    container_name: ditda-green
    restart: unless-stopped
    labels:
      ditda.logs.app: "ditda"
      ditda.logs.service: "ditda-api"
    ports:
      - "127.0.0.1:8082:8080"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ditda-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  redis:
    image: redis:8.6-alpine
    container_name: ditda-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    networks:
      - ditda-net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.3.2-management-alpine
    container_name: ditda-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ditda-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s


  nginx:
    image: nginx:1.27-alpine
    container_name: ditda-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    networks:
      - ditda-net

  certbot:
    image: certbot/certbot:latest
    container_name: ditda-certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  ditda-net:
    name: ditda-net
    driver: bridge

volumes:
  redis-data:
  rabbitmq-data:
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div style="font-family: 'Apple SD Gothic Neo', sans-serif; max-width: 480px; margin: 0 auto; padding: 24px;">

    <div style="text-align: center; margin-bottom: 24px;">
        <img alt="ditda" src="cid:logoImage" style="height: 48px;">
    </div>

    <div style="text-align: center;">
        <h2>새 디자이너 가입 검토 요청</h2>
        <p>새로운 디자이너가 회원가입을 완료했습니다.<br>포트폴리오 검토 후 승인 처리 부탁드립니다.</p>
    </div>

    <div style="margin-top: 24px; padding: 16px 20px; background: #f5f5f7; border-radius: 8px;">
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 80px; color: #888; font-size: 14px;">User ID</span>
            <span style="font-weight: 600; font-family: monospace; color: #874fff;" th:text="${userId}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 80px; color: #888; font-size: 14px;">이름</span>
            <span style="font-weight: 600;" th:text="${name}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 80px; color: #888; font-size: 14px;">이메일</span>
            <span style="font-weight: 600;" th:text="${email}"></span>
        </div>
    </div>

    <div style="margin-top: 16px; padding: 16px 20px; background: #f5f5f7; border-radius: 8px;">
        <div style="color: #888; font-size: 14px; margin-bottom: 8px;">포트폴리오</div>
        <ul style="margin: 0; padding-left: 18px;">
            <li style="margin: 6px 0;" th:each="url, iter : ${portfolioUrls}">
                <a style="color: #874fff; text-decoration: none; font-weight: 600;"
                   target="_blank"
                   th:href="${url}"
                   th:text="'포트폴리오 ' + ${iter.index + 1} + ' 다운로드'"></a>
            </li>
        </ul>
        <div style="margin-top: 12px; color: #c44; font-size: 12px;">
            다운로드 링크는 최대 6시간 동안 유효합니다.<br>
            만료된 경우 개발팀에 문의해주세요.
        </div>
    </div>

    <p style="color: #888; margin-top: 24px; font-size: 14px; text-align: center;">
        본 메일은 자동 발송된 알림입니다.
    </p>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div style="font-family: 'Apple SD Gothic Neo', sans-serif; max-width: 480px; margin: 0 auto; padding: 24px;">

    <div style="text-align: center; margin-bottom: 24px;">
        <img alt="ditda" src="cid:logoImage" style="height: 48px;">
    </div>

    <div style="text-align: center;">
        <h2>새 디자이너 가입 검토 요청</h2>
        <p>새로운 디자이너가 회원가입을 완료했습니다.<br>포트폴리오 검토 후 승인 처리 부탁드립니다.</p>
    </div>

    <!-- 포트폴리오 확인 안내 -->
    <div style="text-align: center;">
        <p style="color: #666; line-height: 1.6;">
            <strong>📌 포트폴리오 확인 안내</strong><br>
            포트폴리오는 메일에 포함되지 않습니다.<br>
            어드민 Swagger에서 디자이너 ID로 포트폴리오를 조회하세요.
        </p>
    </div>

    <div style="margin-top: 24px; padding: 16px 20px; background: #f5f5f7; border-radius: 8px;">
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 80px; color: #888; font-size: 14px;">Designer ID</span>
            <span style="font-weight: 600; font-family: monospace; color: #874fff;" th:text="${designerId}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 80px; color: #888; font-size: 14px;">이름</span>
            <span style="font-weight: 600;" th:text="${name}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 80px; color: #888; font-size: 14px;">이메일</span>
            <span style="font-weight: 600;" th:text="${email}"></span>
        </div>
    </div>

    <div style="margin-top: 24px; text-align: center;">
        <a href="https://api.ditda.kr/swagger-ui/index.html"
           style="display: inline-block; padding: 12px 24px; background: #874fff; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px;">
            어드민 Swagger 바로가기
        </a>
    </div>

    <p style="color: #888; margin-top: 24px; font-size: 14px; text-align: center;">
        본 메일은 자동 발송된 알림입니다.
    </p>
</div>
</body>
</html>

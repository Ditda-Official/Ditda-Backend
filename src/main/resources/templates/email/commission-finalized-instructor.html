<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div style="font-family: 'Apple SD Gothic Neo', sans-serif; max-width: 480px; margin: 0 auto; padding: 24px;">

    <div style="text-align: center; margin-bottom: 24px;">
        <img alt="ditda" src="cid:logoImage" style="height: 48px;">
    </div>

    <div style="text-align: center; ">
        <h2 style="color: #874fff;">외주 최종 확정</h2>
        <p style="color: #222; font-weight: 600; font-size: 16px;" th:text="${instructorName} + ' 강사님'"></p>
        <p style="color: #666; line-height: 1.6;">
            <span th:if="${autoFinalized}">
                신청하신 외주의 <strong>최종 마감일이 지나</strong><br>
                가장 최근 제출된 시안이 <strong style="color: #874fff;">자동으로 최종 확정</strong>되었습니다.
            </span>
            <span th:unless="${autoFinalized}">
                신청하신 외주가 <strong style="color: #874fff;">최종 확정</strong>되었습니다.<br>
                선택하신 시안이 최종 결과물로 확정됩니다.
            </span>
            <br><br>
            확정된 시안은 검토를 거쳐<br>
            <strong>영업일 기준 2~3일 내에 최종 확정본을 메일로 발송</strong>해 드립니다.
            <br><br>
            <a href="https://www.ditda.kr" style="color: #874fff; text-decoration: none; font-weight: bold;">ditda</a>를
            이용해 주셔서 진심으로 감사드립니다.
        </p>


    </div>

    <div style="margin-top: 24px; padding: 16px 20px; background: #f5f5f7; border-radius: 8px;">
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 90px; color: #888; font-size: 14px;">외주명</span>
            <span style="font-weight: 600;" th:text="${commissionTitle}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 90px; color: #888; font-size: 14px;">진행 상태</span>
            <span style="font-weight: 600; color: #874fff;">최종 확정 완료</span>
        </div>
    </div>

    <div style="margin-top: 24px; text-align: center;">
        <a href="https://ditda.kr/instructor"
           style="display: inline-block; padding: 12px 24px; background: #874fff; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px;">
            대시보드 바로가기
        </a>
    </div>

    <p style="color: #999; margin-top: 32px; font-size: 12px; text-align: center; border-top: 1px solid #eee; padding-top: 16px;">
        본 메일은 수신전용 메일이므로 회신되지 않습니다.
    </p>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div style="font-family: 'Apple SD Gothic Neo', sans-serif; max-width: 480px; margin: 0 auto; padding: 24px;">
    <div style="text-align: center; margin-bottom: 24px;">
        <img alt="ditda" src="cid:logoImage" style="height: 48px;">
    </div>
    <div style="text-align: center;">
        <h2 style="color: #b45309;">1차 시안 기한 초과 안내</h2>
        <p style="color: #222; font-weight: 600; font-size: 16px;" th:text="${designerName} + ' 디자이너님'"></p>
        <p style="color: #666; line-height: 1.6;">
            지원하신 외주의 <strong>1차 시안 마감일까지 시안을 제출하지 않으셔서</strong><br>
            본 외주에서 자동 탈락 처리되었습니다.<br><br>
            <a href="https://www.ditda.kr" style="color: #874fff; text-decoration: none; font-weight: bold;">ditda</a>에서 다시 만나뵐 수 있기를 기대합니다.
        </p>
    </div>
    <div style="margin-top: 24px; padding: 16px 20px; background: #f5f5f7; border-radius: 8px;">
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 90px; color: #888; font-size: 14px;">외주명</span>
            <span style="font-weight: 600;" th:text="${commissionTitle}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 90px; color: #888; font-size: 14px;">처리 결과</span>
            <span style="font-weight: 600; color: #b45309;">자동 탈락</span>
        </div>
    </div>
    <p style="color: #999; margin-top: 32px; font-size: 12px; text-align: center; border-top: 1px solid #eee; padding-top: 16px;">
        본 메일은 수신전용 메일이므로 회신되지 않습니다.
    </p>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div style="font-family: 'Apple SD Gothic Neo', sans-serif; max-width: 480px; margin: 0 auto; padding: 24px;">

    <div style="text-align: center; margin-bottom: 24px;">
        <img alt="ditda" src="cid:logoImage" style="height: 48px;">
    </div>

    <div style="text-align: center;">
        <h2>외주 입금 확인 요청</h2>
        <p>강사가 입금 완료를 통보했습니다.<br>입금 내역 확인 후 진행 처리 부탁드립니다.</p>
    </div>

    <div style="margin-top: 24px; padding: 16px 20px; background: #f5f5f7; border-radius: 8px;">
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 90px; color: #888; font-size: 14px;">외주 ID</span>
            <span style="font-weight: 600; font-family: monospace; color: #874fff;" th:text="${commissionId}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 90px; color: #888; font-size: 14px;">외주명</span>
            <span style="font-weight: 600;" th:text="${title}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 90px; color: #888; font-size: 14px;">강사</span>
            <span style="font-weight: 600;" th:text="${instructorName}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 90px; color: #888; font-size: 14px;">입금자명</span>
            <span style="font-weight: 600;" th:text="${depositorName}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 90px; color: #888; font-size: 14px;">금액</span>
            <span style="font-weight: 600;" th:text="${#numbers.formatInteger(amount, 0, 'COMMA')} + '원'"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 90px; color: #888; font-size: 14px;">통보 시각</span>
            <span style="font-weight: 600;" th:text="${notifiedAt}"></span>
        </div>
    </div>

    <p style="color: #888; margin-top: 24px; font-size: 14px; text-align: center;">
        본 메일은 자동 발송된 알림입니다.
    </p>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div style="font-family: 'Apple SD Gothic Neo', sans-serif; max-width: 480px; margin: 0 auto; padding: 24px;">
    <div style="text-align: center; margin-bottom: 24px;">
        <img alt="ditda" src="cid:logoImage" style="height: 48px;">
    </div>
    <div style="text-align: center;">
        <h2 style="color: #222;">외주 마감 환불 처리 요청</h2>
        <p style="color: #666; line-height: 1.5;">
            외주 마감 또는 취소로 인해 정산(환불) 사유가 발생했습니다.<br>
            아래 내역을 확인하신 후 수동 환불을 진행해주시기 바랍니다.
        </p>
    </div>
    <div style="margin-top: 24px; padding: 16px 20px; background: #f5f5f7; border-radius: 8px;">
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 100px; color: #888; font-size: 14px;">외주 ID</span>
            <span style="font-weight: 600; font-family: monospace; color: #874fff;" th:text="${commissionId}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 100px; color: #888; font-size: 14px;">외주명</span>
            <span style="font-weight: 600;" th:text="${commissionTitle}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 100px; color: #888; font-size: 14px;">강사명</span>
            <span style="font-weight: 600;" th:text="${instructorName}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 100px; color: #888; font-size: 14px;">강사 이메일</span>
            <span style="font-weight: 600;" th:text="${instructorEmail}"></span>
        </div>
        <div style="margin: 8px 0;">
            <span style="display: inline-block; width: 100px; color: #888; font-size: 14px;">마감 형태</span>
            <span style="font-weight: 600; color: #e53e3e;" th:if="${isCancelled}">지원자 0명 (외주 취소)</span>
            <span style="font-weight: 600; color: #3182ce;" th:unless="${isCancelled}">정원 미달 (부분 환불 진행)</span>
        </div>
        <div style="margin: 8px 0; border-top: 1px solid #e2e8f0; padding-top: 8px;">
            <span style="display: inline-block; width: 100px; color: #888; font-weight: 600; font-size: 14px;">환불 요청액</span>
            <span style="font-weight: 700; color: #e53e3e; font-size: 16px;"
                  th:text="${#numbers.formatInteger(refundAmount, 0, 'COMMA')} + '원'"></span>
        </div>
    </div>
    <p style="color: #888; margin-top: 24px; font-size: 13px; text-align: center;">
        본 메일은 시스템에 의해 자동 발송된 관리자 전용 알림입니다.
    </p>
</div>
</body>
</html>

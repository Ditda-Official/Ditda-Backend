spring:
  application:
    name: ditda
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    out-of-order: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
    web:
      pageable:
        default-page-size: 10
        max-page-size: 30
        one-indexed-parameters: false

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}
  refresh-token-hash-secret: ${JWT_REFRESH_TOKEN_HASH_SECRET}
  cookie-secure: ${JWT_COOKIE_SECURE}
  refresh-cookie-path: ${JWT_REFRESH_COOKIE_PATH}

encrypt:
  secret-key: ${ENCRYPT_SECRET_KEY}

admin:
  notification-email: ${ADMIN_NOTIFICATION_EMAIL}

app:
  s3:
    max-file-size: 30MB
    public-bucket: ${S3_PUBLIC_BUCKET}
    private-bucket: ${S3_PRIVATE_BUCKET}
    presigned-url-ttl-minutes: ${S3_PRESIGNED_URL_TTL_MINUTES:10}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: never
  otlp:
    metrics:
      export:
        enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

  tracing:
    sampling:
      probability: 1.0
    export:
      otlp:
        enabled: ${OTLP_TRACING_ENABLED}

  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

server:
  tomcat:
    mbeanregistry:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
